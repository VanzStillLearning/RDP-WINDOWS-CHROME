name: Windows-Desktop-Remote

on:
  workflow_dispatch:

jobs:
  windows-desktop:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Menyiapkan Chrome Remote Desktop
        shell: cmd
        run: |
          :: Mengunduh menggunakan curl bawaan Windows dengan trik user-agent agar tidak 404
          curl -L -o chromeremotedesktophost.msi "https://dl.google.com/remotedesktop/headless/chromeremotedesktophost.msi"
          
          :: Menjalankan instalasi secara diam-diam
          msiexec /i chromeremotedesktophost.msi /qn /norestart

      - name: Menghubungkan RDP Windows
        shell: cmd
        run: |
          :: PENTING: Ganti kode di bawah dengan KODE BARU dari remotedesktop.google.com/headless!
          "%PROGRAMFILES(X86)%\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AdkVLPwqiAY4fFXhs9c_vRR7nl0c53F1razWrucccPoYAJZQU8FAuCHvOWFkm4_8sbACRQ" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=%COMPUTERNAME% --pin=123456

      - name: Keep Alive
        shell: cmd
        run: |
          :: Menjaga server Windows tetap hidup
          powershell -Command "Start-Sleep -Seconds 21600"
          
