name: Windows-Desktop-Remote

on:
  workflow_dispatch:

jobs:
  windows-desktop:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Menyiapkan Chrome Remote Desktop via Choco
        shell: cmd
        run: |
          :: Menginstal Chrome Remote Desktop menggunakan paket manager Choco bawaan runner
          choco install chrome-remote-desktop -y
          
      - name: Menghubungkan RDP Windows
        shell: cmd
        run: |
          :: Menggunakan kode otorisasi terbaru Anda (PIN default: 123456)
          "%PROGRAMFILES(X86)%\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AdkVLPz-LBi5BNoi5U5d6hYdLZvyFifzUDFLCmtws2X7vR_LGyi4y1vTZ2MIoifqGvMmtg" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=%COMPUTERNAME% --pin=123456

      - name: Keep Alive
        shell: cmd
        run: |
          :: Menjaga server Windows tetap hidup selama 6 jam
          powershell -Command "Start-Sleep -Seconds 21600"
          
