name: Windows-Desktop-Remote

on:
  workflow_dispatch:

jobs:
  windows-desktop:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Menyiapkan Chrome Remote Desktop via Winget
        shell: cmd
        run: |
          :: Menginstal Chrome Remote Desktop menggunakan paket manager resmi bawaan Windows
          winget install --id Google.ChromeRemoteDesktop --exact --silent --accept-source-agreements --accept-package-agreements
          
      - name: Menghubungkan RDP Windows
        shell: cmd
        run: |
          :: Menggunakan kode otorisasi terbaru Anda (PIN default: 123456)
          "%PROGRAMFILES(X86)%\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AdkVLPwtPe3TSEwc39x8vgSGPUHe9PTwpaM0CyIx44DESnfYXS3Q0G3aJGQyEY28XO3R5Q" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=%COMPUTERNAME% --pin=123456

      - name: Keep Alive
        shell: cmd
        run: |
          :: Menjaga server Windows tetap hidup selama 6 jam
          powershell -Command "Start-Sleep -Seconds 21600"
          
