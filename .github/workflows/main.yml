name: Windows-Desktop-Remote

on:
  workflow_dispatch:

jobs:
  windows-desktop:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Menyiapkan Chrome Remote Desktop
        shell: cmd
        run: |
          :: Mengunduh langsung msi menggunakan perintah WebClient PowerShell yang lebih akurat
          powershell -Command "(New-Object System.Net.WebClient).DownloadFile('https://dl.google.com/remotedesktop/headless/chromeremotedesktophost.msi', 'chromeremotedesktophost.msi')"
          
          :: Jalankan instalasi secara diam-diam
          msiexec /i chromeremotedesktophost.msi /qn /norestart

      - name: Menghubungkan RDP Windows
        shell: cmd
        run: |
          :: Gunakan kode otorisasi terbaru Anda
          "%PROGRAMFILES(X86)%\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AdkVLPxCD1m0EOG72bMQSEJQ4vyiYNcHV8RbxxHqj5mGOs6PXi4SO31-lKGwfYJqKweL-g" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=%COMPUTERNAME% --pin=123456

      - name: Keep Alive
        shell: cmd
        run: |
          powershell -Command "Start-Sleep -Seconds 21600"
          
